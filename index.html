<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>جحا سوهاج#80FF00- Kentucky</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --kfc-red: #E4002B;
            --kfc-red-dark: #B8001F;
            --kfc-red-light: #FF3D5A;
            --kfc-black: #1A1A1A;
            --kfc-gray: #2D2D2D;
            --kfc-light: #F5F5F5;
            --kfc-cream: #FFF8F0;
            --kfc-gold: #FFB800;
            --kfc-orange: #FF6B35;
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.5);
            --success: #00C853;
            --danger: #FF3D00;
            --card-bg: rgba(255,255,255,0.05);
            --border-color: rgba(255,255,255,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Cairo', 'Tajawal', sans-serif;
            background: var(--kfc-black);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* === Animated Background === */
        .app-wrapper {
            position: relative;
            min-height: 100vh;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            animation: floatOrb 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: var(--kfc-red);
            top: -200px;
            right: -200px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: var(--kfc-orange);
            bottom: -100px;
            left: -100px;
            animation-delay: -10s;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(-30px, -20px) scale(1.02); }
        }

        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.03;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        .app-container {
            position: relative;
            z-index: 2;
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background: linear-gradient(180deg, rgba(26,26,26,0.95) 0%, rgba(26,26,26,0.98) 100%);
        }

        /* === Header === */
        .main-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(180deg, rgba(26,26,26,0.98) 0%, rgba(26,26,26,0.9) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 0 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--kfc-red) 0%, var(--kfc-red-dark) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 20px;
            color: white;
            box-shadow: 0 4px 15px rgba(228, 0, 43, 0.4);
        }

        .brand-name {
            font-size: 26px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--kfc-red) 0%, var(--kfc-red-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .icon-button {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .icon-button:hover {
            background: rgba(228, 0, 43, 0.1);
            border-color: var(--kfc-red);
            color: var(--kfc-red);
        }

        .icon-button:active {
            transform: scale(0.95);
        }

        .icon-button.active {
            background: rgba(228, 0, 43, 0.15);
            border-color: var(--kfc-red);
            color: var(--kfc-red);
        }

        .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            min-width: 20px;
            height: 20px;
            background: var(--kfc-red);
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
            color: white;
            border: 2px solid var(--kfc-black);
            animation: badgePop 0.3s ease;
        }

        @keyframes badgePop {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* === Branch Selector === */
        .branch-selector {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .branch-selector:hover {
            background: rgba(228, 0, 43, 0.05);
            border-color: rgba(228, 0, 43, 0.2);
        }

        .branch-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--kfc-red) 0%, var(--kfc-red-dark) 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .branch-info {
            flex: 1;
        }

        .branch-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        .branch-name {
            font-size: 14px;
            font-weight: 700;
        }

        /* === Categories === */
        .categories-wrapper {
            padding: 20px 16px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .categories-wrapper::-webkit-scrollbar {
            display: none;
        }

        .categories-list {
            display: flex;
            gap: 10px;
        }

        .category-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .category-chip:hover {
            background: rgba(228, 0, 43, 0.1);
            border-color: rgba(228, 0, 43, 0.3);
        }

        .category-chip.active {
            background: linear-gradient(135deg, var(--kfc-red) 0%, var(--kfc-red-dark) 100%);
            border-color: transparent;
            color: white;
            box-shadow: 0 4px 20px rgba(228, 0, 43, 0.4);
        }

        .category-icon {
            font-size: 18px;
        }

        /* === Menu Grid === */
        .menu-section {
            padding: 0 16px 120px;
        }

        .section-title {
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--kfc-red);
            border-radius: 2px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        .menu-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .menu-card:hover {
            transform: translateY(-6px);
            border-color: rgba(228, 0, 43, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .menu-card:active {
            transform: translateY(-2px) scale(0.98);
        }

        .card-image-wrapper {
            position: relative;
            height: 130px;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(228,0,43,0.1) 0%, rgba(255,107,53,0.1) 100%);
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .menu-card:hover .card-image {
            transform: scale(1.1);
        }

        .card-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--kfc-red);
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .card-content {
            padding: 14px;
        }

        .card-title {
            font-size: 15px;
            font-weight: 800;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .card-desc {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 10px;
            line-height: 1.5;
            height: 33px;
            overflow: hidden;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-price {
            font-size: 18px;
            font-weight: 900;
            color: var(--kfc-red);
        }

        .card-price span {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* === Add Button === */
        .add-button {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--kfc-red) 0%, var(--kfc-red-dark) 100%);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(228, 0, 43, 0.4);
            transition: all 0.15s ease;
        }

        .add-button:hover {
            box-shadow: 0 6px 20px rgba(228, 0, 43, 0.5);
        }

        .add-button:active {
            transform: scale(0.9);
            box-shadow: 0 2px 10px rgba(228, 0, 43, 0.3);
        }

        /* === Floating Cart === */
        .floating-cart {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 448px;
            background: linear-gradient(135deg, var(--kfc-red) 0%, var(--kfc-red-dark) 100%);
            border-radius: 20px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(228, 0, 43, 0.5);
            z-index: 99;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s ease;
        }

        .floating-cart:hover {
            transform: translateX(-50%) translateY(-2px);
            box-shadow: 0 15px 50px rgba(228, 0, 43, 0.6);
        }

        .floating-cart:active {
            transform: translateX(-50%) translateY(0);
        }

        .cart-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cart-count-badge {
            background: rgba(255,255,255,0.25);
            padding: 6px 14px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 14px;
        }

        .cart-text {
            font-weight: 700;
            font-size: 15px;
        }

        .cart-total {
            font-weight: 900;
            font-size: 20px;
        }

        /* === Modal === */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 200;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: var(--kfc-black);
            border-radius: 28px 28px 0 0;
            width: 100%;
            max-width: 480px;
            max-height: 92vh;
            overflow-y: auto;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            position: sticky;
            top: 0;
            background: var(--kfc-black);
            z-index: 10;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-title {
            font-size: 22px;
            font-weight: 900;
        }

        .back-button {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .back-button:hover {
            background: rgba(228, 0, 43, 0.1);
            border-color: var(--kfc-red);
        }

        /* === Cart Item === */
        .cart-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px;
            background: var(--card-bg);
            border-radius: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
        }

        .cart-item-image {
            width: 70px;
            height: 70px;
            border-radius: 14px;
            object-fit: cover;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 800;
            font-size: 15px;
            margin-bottom: 4px;
        }

        .cart-item-price {
            color: var(--kfc-red);
            font-weight: 700;
        }

        .qty-control {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 6px;
        }

        .qty-btn {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .qty-btn:hover {
            background: rgba(228, 0, 43, 0.2);
        }

        .qty-btn.minus {
            color: var(--text-muted);
        }

        .qty-btn.plus {
            color: var(--kfc-red);
        }

        .qty-value {
            font-weight: 800;
            font-size: 16px;
            min-width: 24px;
            text-align: center;
        }

        /* === Form === */
        .form-section {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-input {
            width: 100%;
            padding: 16px 18px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--kfc-red);
            box-shadow: 0 0 0 4px rgba(228, 0, 43, 0.1);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        textarea.form-input {
            resize: none;
            height: 100px;
        }

        /* === Summary Card === */
        .summary-card {
            background: rgba(255,255,255,0.03);
            border: 1px dashed var(--border-color);
            border-radius: 16px;
            padding: 18px;
            margin-top: 16px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
            color: var(--text-secondary);
        }

            font-size: 18px;
